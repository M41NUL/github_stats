name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GH_TOKEN }}
      
      - name: Create generated directory
        run: mkdir -p generated
      
      - name: Download Overview Stats
        run: |
          curl -L -o generated/overview.svg "https://github-readme-stats.vercel.app/api?username=M41NUL&show_icons=true&theme=dark&count_private=true&hide_border=true&include_all_commits=true"
          echo "✅ Overview stats downloaded"
      
      - name: Download Language Stats
        run: |
          curl -L -o generated/languages.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=M41NUL&layout=compact&theme=dark&hide_border=true"
          echo "✅ Language stats downloaded"
      
      - name: Show files
        run: ls -la generated/
      
      - name: Commit and Push
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add generated/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update stats [skip ci]"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}

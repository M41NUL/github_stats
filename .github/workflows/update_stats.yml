name: Update GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *"   # Runs daily at 12 AM UTC
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Generate Overview Stats
        run: |
          mkdir -p generated
          curl -o generated/overview.svg "https://github-readme-stats.vercel.app/api?username=M41NUL&show_icons=true&theme=tokyonight"

      - name: Generate Language Stats
        run: |
          curl -o generated/languages.svg "https://github-readme-stats.vercel.app/api/top-langs/?username=M41NUL&layout=compact&theme=tokyonight"

      - name: Commit & Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add generated/
          git commit -m "Update GitHub stats"
          git push
